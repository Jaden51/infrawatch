[daemon]
poll_interval_secs = 5

[aws]
region = "us-west-2"
profile_name = "infrawatch-daemon"

[metrics]
enabled = true
instance_metrics = ["CPUUtilization", "NetworkIn", "NetworkOut"]

[system]
enabled = true

[analysis]
mode = "threshold"

[[analysis.thresholds]]
metric_name = "memory.usage_percent"
warning = 80.0
critical = 90.0

[[analysis.thresholds]]
metric_name = "CPUUtilization"
warning = 70.0
critical = 90.0

# Disk usage metrics are emitted as: disk.{mount}.usage_percent
# For the root filesystem ("/"), the mount is normalized to "_": disk._.usage_percent
[[analysis.thresholds]]
metric_name = "disk._.usage_percent"
warning = 80.0
critical = 95.0
