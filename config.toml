[aws]
region = "us-west-2"
profile_name = "infrawatch-daemon"

[metrics]
instance_metrics = ["CPUUtilization", "NetworkIn", "NetworkOut"]

[system]
enabled = true
collect_memory = true
collect_disk = true
collect_processes = true

[analysis]
mode = "threshold"

[[analysis.thresholds]]
metric_name = "memory_usage_percent"
warning = 80.0
critical = 90.0

[[analysis.thresholds]]
metric_name = "CPUUtilization"
warning = 70.0
critical = 90.0

[[analysis.thresholds]]
metric_name = "disk_usage_percent"
warning = 80.0
critical = 95.0
